<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chamchuri United — Player Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#fce7f3;color:#1a1a2e;font-family:'Sarabun',sans-serif;font-size:14px;line-height:1.5;min-height:100vh}
.topbar{background:#f9a8d4;border-bottom:2px solid #f472b6;padding:0 20px;height:50px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.logo{font-size:16px;font-weight:600;color:#1a1a2e}
.logo em{color:#be185d;font-style:normal}
.tag{font-size:11px;color:#6b3a5a;margin-left:auto}
.fbar{background:#fbcfe8;border-bottom:1px solid #f9a8d4;padding:10px 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;position:sticky;top:50px;z-index:90}
.fbar label{font-size:11px;color:#6b3a5a}
select,input[type=text]{background:#ffffff;border:1px solid #f9a8d4;color:#1a1a2e;padding:5px 10px;border-radius:6px;font-size:13px;font-family:'Sarabun',sans-serif;cursor:pointer}
select:focus,input:focus{outline:none;border-color:#be185d}
#inp-search{width:160px}
#inp-search::placeholder{color:#c084a0}
.btn-clear{background:none;border:1px solid #f9a8d4;color:#6b3a5a;padding:4px 10px;border-radius:5px;cursor:pointer;font-size:12px;font-family:'Sarabun',sans-serif}
.btn-clear:hover{border-color:#be185d;color:#be185d}
.fcount{font-size:11px;color:#c084a0;margin-left:auto}
.wrap{max-width:1260px;margin:0 auto;padding:20px}
.empty{text-align:center;padding:80px 0;color:#6b3a5a}
.empty h2{font-size:20px;margin-bottom:8px;color:#be185d}
.phead{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.avt{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px;flex-shrink:0}
.avt.GK{background:#dbeafe;color:#1d4ed8}
.avt.DF{background:#d1fae5;color:#065f46}
.avt.MF{background:#fef3c7;color:#92400e}
.avt.FC{background:#fee2e2;color:#991b1b}
.phead-info h1{font-size:20px;font-weight:600;margin:0 0 2px;color:#1a1a2e}
.phead-info p{font-size:12px;color:#6b3a5a}
.pbadge{display:inline-block;font-size:11px;font-weight:500;padding:2px 7px;border-radius:4px;margin-right:6px}
.pbadge.GK{background:#dbeafe;color:#1d4ed8}
.pbadge.DF{background:#d1fae5;color:#065f46}
.pbadge.MF{background:#fef3c7;color:#92400e}
.pbadge.FC{background:#fee2e2;color:#991b1b}
.season-strip{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.season-strip span{font-size:11px;color:#6b3a5a;margin-right:4px}
.chip{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid #f9a8d4;cursor:pointer;background:#ffffff;color:#6b3a5a;font-family:'Sarabun',sans-serif}
.chip:hover{border-color:#be185d;color:#be185d}
.chip.active{background:#be185d;color:#ffffff;border-color:#be185d}
.metrics{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px;margin-bottom:14px}
.met{background:#ffffff;border:1px solid #f9a8d4;border-radius:10px;padding:12px 14px}
.met-lbl{font-size:10px;color:#6b3a5a;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.met-val{font-size:22px;font-weight:600;line-height:1.1;color:#1a1a2e}
.met-sub{font-size:10px;color:#c084a0;margin-top:3px}
.card{background:#ffffff;border:1px solid #f9a8d4;border-radius:10px;padding:16px;margin-bottom:12px}
.ctitle{font-size:11px;color:#6b3a5a;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px;margin-bottom:12px}
.srow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #fce7f3}
.srow:last-child{border-bottom:none}
.srow-name{font-size:12px;color:#6b3a5a}
.srow-val{font-size:13px;font-weight:500;color:#1a1a2e}
.wdl-r{display:flex;align-items:center;gap:8px;margin:6px 0}
.wdl-lbl{width:52px;font-size:12px;color:#6b3a5a}
.wdl-track{flex:1;height:7px;background:#fce7f3;border-radius:4px;overflow:hidden}
.wdl-fill{height:100%;border-radius:4px}
.wdl-n{width:28px;text-align:right;font-size:12px;font-weight:500}
.lc-grid{display:grid;gap:20px}
@media(max-width:720px){.metrics{grid-template-columns:repeat(3,1fr)}.g2,.g3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">&#9917; <em>Chamchuri</em> United</div>
  <div class="tag">Player Dashboard &middot; 2015&ndash;2025</div>
</div>
<div class="fbar">
  <label>ตำแหน่ง</label>
  <select id="sel-pos" onchange="rebuildList()">

    <option value="GK">GK</option>
    <option value="DF">DF</option>
    <option value="MF">MF</option>
    <option value="FC">FC</option>
  </select>
  <label>ค้นหา</label>
  <input type="text" id="inp-search" placeholder="ชื่อ / ชื่อเล่น..." oninput="rebuildList()">
  <label>เลือกนักเตะ</label>
  <select id="sel-player" onchange="onPick()">
    <option value="">&#8212; เลือกนักเตะ &#8212;</option>
  </select>
  <button class="btn-clear" onclick="clearAll()">ล้างทั้งหมด</button>
  <span class="fcount" id="fcount"></span>
</div>
<div class="wrap" id="main">

var byPC={};
DATA.forEach(function(p){byPC[p.pc]=p;});
var activeSeas=new Set();
var charts={};

function pct(n,t){return t>0?Math.round(n/t*100):0;}
function shortName(p){return p.nick||(p.name.length>10?p.name.slice(0,10)+'…':p.name);}

function mkChart(id,cfg){
  if(charts[id])charts[id].destroy();
  var el=document.getElementById(id);
  if(!el)return;
  charts[id]=new Chart(el,cfg);
}

var GRID='#fce7f3', TICK='#6b3a5a';
function baseScale(){
  return {ticks:{color:TICK,font:{size:11}},grid:{color:GRID}};
}

function rebuildList(){
  var pos=document.getElementById('sel-pos').value;
  var q=document.getElementById('inp-search').value.toLowerCase().trim();
  var sel=document.getElementById('sel-player');
  var prev=sel.value;
  while(sel.options.length>1)sel.remove(1);
  var count=0;
  DATA.forEach(function(p){
    var matchPos=!pos||p.pos===pos;
    var matchQ=!q||p.nick.toLowerCase().indexOf(q)>=0||p.name.toLowerCase().indexOf(q)>=0||p.pc.toLowerCase().indexOf(q)>=0;
    if(!matchPos||!matchQ)return;
    count++;
    var txt=shortName(p)+'  ('+p.pos+') · '+p.total.apps+' นัด';
    var opt=document.createElement('option');
    opt.value=p.pc; opt.text=txt;
    sel.add(opt);
  });
  if([].slice.call(sel.options).some(function(o){return o.value===prev;}))sel.value=prev;
  document.getElementById('fcount').textContent=count+' นักเตะ';
  render();
}

function onPick(){activeSeas=new Set();render();}

function clearAll(){
  document.getElementById('sel-pos').value='';
  document.getElementById('inp-search').value='';
  document.getElementById('sel-player').value='';
  activeSeas=new Set();
  rebuildList();
}

function toggleSeas(yr){
  if(activeSeas.has(yr))activeSeas.delete(yr);
  else activeSeas.add(yr);
  render();
}

function getFiltered(p){
  if(activeSeas.size===0)return p;
  var bs={};
  Object.keys(p.by_season).forEach(function(k){
    if(activeSeas.has(Number(k)))bs[k]=p.by_season[k];
  });
  var apps=0,starts=0,subs=0,g=0,a=0,W=0,D=0,L=0;
  Object.values(bs).forEach(function(v){
    apps+=v.apps;starts+=v.starts;subs+=v.subs;
    g+=v.g;a+=v.a;W+=v.W||0;D+=v.D||0;L+=v.L||0;
  });
  return Object.assign({},p,{total:{apps:apps,starts:starts,subs:subs,g:g,a:a,W:W,D:D,L:L},by_season:bs});
}

function srow(name,val,sub,color){
  var valStr=String(val)+(sub||'');
  var colorAttr=color?' style="color:'+color+'"':'';
  return '<div class="srow"><span class="srow-name">'+name+'</span><span class="srow-val"'+colorAttr+'>'+valStr+'</span></div>';
}

function render(){
  var pc=document.getElementById('sel-player').value;
  var wrap=document.getElementById('main');
  if(!pc){
    wrap.innerHTML='<div class="empty"><h2>เลือกนักเตะ</h2><p>ใช้ตัวกรองด้านบนเพื่อค้นหาและเลือกนักเตะ</p></div>';
    return;
  }
  var raw=byPC[pc];
  var p=getFiltered(raw);
  var t=p.total;
  var gc=t.g+t.a;
  var wr=pct(t.W||0,t.apps);
  var sr=pct(t.starts,t.apps);
  var allSeas=Object.keys(raw.by_season).map(Number).sort();

  var chipAll='<button class="chip'+(activeSeas.size===0?' active':'')+'" onclick="activeSeas=new Set();render()">ทั้งหมด</button>';
  var chipsSeas=allSeas.map(function(yr){
    var active=activeSeas.size>0&&activeSeas.has(yr);
    return '<button class="chip'+(active?' active':'')+'" onclick="toggleSeas('+yr+')">'+yr+'</button>';
  }).join('');

  var stW=raw.as_starter.W||0,stD=raw.as_starter.D||0,stL=raw.as_starter.L||0,stT=stW+stD+stL;
  var suW=raw.as_sub.W||0,suD=raw.as_sub.D||0,suL=raw.as_sub.L||0,suT=suW+suD+suL;
  var stPct=pct(stW,stT), suPct=pct(suW,suT);

  var html='';
  html+='<div class="phead">';
  html+='<div class="avt '+p.pos+'">'+p.pos+'</div>';
  html+='<div class="phead-info"><h1>'+(p.nick||p.name)+' <span style="font-size:13px;font-weight:400;color:#6b3a5a">'+p.name+'</span></h1>';
  html+='<p><span class="pbadge '+p.pos+'">'+p.pos+'</span>ซีซันที่เล่น: '+raw.seasons.join(', ')+'</p></div></div>';

  html+='<div class="season-strip"><span>filter season:</span>'+chipAll+chipsSeas+'</div>';

  html+='<div class="metrics">';
  html+='<div class="met"><div class="met-lbl">นัดทั้งหมด</div><div class="met-val" style="color:#be185d">'+t.apps+'</div></div>';
  html+='<div class="met"><div class="met-lbl">ตัวจริง</div><div class="met-val" style="color:#059669">'+t.starts+'</div><div class="met-sub">'+sr+'%</div></div>';
  html+='<div class="met"><div class="met-lbl">ตัวสำรอง</div><div class="met-val" style="color:#7c3aed">'+t.subs+'</div><div class="met-sub">'+(100-sr)+'%</div></div>';
  html+='<div class="met"><div class="met-lbl">ประตู</div><div class="met-val" style="color:#059669">'+t.g+'</div><div class="met-sub">'+(t.apps>0?(t.g/t.apps).toFixed(2):0)+'/นัด</div></div>';
  html+='<div class="met"><div class="met-lbl">แอสซิสต์</div><div class="met-val" style="color:#d97706">'+t.a+'</div><div class="met-sub">'+(t.apps>0?(t.a/t.apps).toFixed(2):0)+'/นัด</div></div>';
  html+='<div class="met"><div class="met-lbl">G+A</div><div class="met-val">'+gc+'</div><div class="met-sub">'+(t.apps>0?(gc/t.apps).toFixed(2):0)+'/นัด</div></div>';
  html+='</div>';

  html+='<div class="g3">';
  html+='<div class="card"><div class="ctitle">appearances รายซีซัน</div><div style="position:relative;height:180px"><canvas id="ch-apps"></canvas></div></div>';
  html+='<div class="card"><div class="ctitle">win ratio</div>';
  html+='<div style="text-align:center;padding:8px 0 12px"><div style="font-size:34px;font-weight:600;color:'+(wr>=50?'#059669':'#dc2626')+'">'+wr+'%</div>';
  html+='<div style="font-size:11px;color:#6b3a5a">win rate ('+( t.W||0)+'W '+(t.D||0)+'D '+(t.L||0)+'L)</div></div>';
  html+='<div class="wdl-r"><span class="wdl-lbl">ชนะ</span><div class="wdl-track"><div class="wdl-fill" style="width:'+pct(t.W,t.apps)+'%;background:#059669"></div></div><span class="wdl-n" style="color:#059669">'+(t.W||0)+'</span></div>';
  html+='<div class="wdl-r"><span class="wdl-lbl">เสมอ</span><div class="wdl-track"><div class="wdl-fill" style="width:'+pct(t.D,t.apps)+'%;background:#d97706"></div></div><span class="wdl-n" style="color:#d97706">'+(t.D||0)+'</span></div>';
  html+='<div class="wdl-r"><span class="wdl-lbl">แพ้</span><div class="wdl-track"><div class="wdl-fill" style="width:'+pct(t.L,t.apps)+'%;background:#dc2626"></div></div><span class="wdl-n" style="color:#dc2626">'+(t.L||0)+'</span></div>';
  html+='</div>';
  html+='<div class="card"><div class="ctitle">สถิติรวม</div>';
  html+=srow('ลงสนาม',t.apps,' นัด','');
  html+=srow('ตัวจริง',t.starts,' ('+sr+'%)','');
  html+=srow('ตัวสำรอง',t.subs,'','');
  html+=srow('ประตู',t.g,'','#059669');
  html+=srow('แอสซิสต์',t.a,'','#d97706');
  html+=srow('G+A',gc,'','');
  html+='</div></div>';

  html+='<div class="g2">';
  html+='<div class="card"><div class="ctitle">ประตู + แอสซิสต์ รายซีซัน</div><div style="position:relative;height:180px"><canvas id="ch-ga"></canvas></div></div>';
  html+='<div class="card"><div class="ctitle">win rate — ตัวจริง vs สำรอง</div>';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">';
  html+='<div style="text-align:center"><div style="font-size:11px;color:#6b3a5a;margin-bottom:4px">ตัวจริง</div>';
  html+='<div style="font-size:28px;font-weight:600;color:'+(stPct>=50?'#059669':'#dc2626')+'">'+stPct+'%</div>';
  html+='<div style="font-size:10px;color:#c084a0">'+stW+'W '+stD+'D '+stL+'L</div></div>';
  html+='<div style="text-align:center"><div style="font-size:11px;color:#6b3a5a;margin-bottom:4px">ตัวสำรอง</div>';
  html+='<div style="font-size:28px;font-weight:600;color:'+(suPct>=50?'#059669':'#dc2626')+'">'+suPct+'%</div>';
  html+='<div style="font-size:10px;color:#c084a0">'+suW+'W '+suD+'D '+suL+'L</div></div></div>';
  html+='<div style="position:relative;height:90px"><canvas id="ch-apptype"></canvas></div></div></div>';

  var comps=Object.keys(p.by_comp);
  if(comps.length){
    html+='<div class="card"><div class="ctitle">League vs Cup</div>';
    html+='<div class="lc-grid" style="grid-template-columns:'+(comps.length>1?'1fr 1fr':'1fr')+'">';
    comps.forEach(function(c){
      var d=p.by_comp[c];
      html+='<div><div style="font-size:13px;font-weight:500;color:'+(c==='League'?'#be185d':'#7c3aed')+';margin-bottom:8px">'+c+'</div>';
      html+=srow('นัด',d.apps,'','');
      html+=srow('ตัวจริง',d.starts,'','');
      html+=srow('สำรอง',d.subs,'','');
      html+=srow('ประตู',d.g,'','#059669');
      html+=srow('แอสซิสต์',d.a,'','#d97706');
      html+=srow('G+A',d.g+d.a,'','');
      html+='<div style="margin-top:8px;display:flex;gap:10px;font-size:12px">';
      html+='<span style="color:#059669">W '+(d.W||0)+'</span>';
      html+='<span style="color:#d97706">D '+(d.D||0)+'</span>';
      html+='<span style="color:#dc2626">L '+(d.L||0)+'</span></div></div>';
    });
    html+='</div></div>';
  }

  wrap.innerHTML=html;
  drawCharts(p);
}

function drawCharts(p){
  var seasons=Object.keys(p.by_season).sort();
  var sd=seasons.map(function(s){return p.by_season[s];});

  mkChart('ch-apps',{
    type:'bar',
    data:{labels:seasons,datasets:[
      {label:'ตัวจริง',data:sd.map(function(d){return d.starts;}),backgroundColor:'#059669cc',borderRadius:3},
      {label:'สำรอง',data:sd.map(function(d){return d.subs;}),backgroundColor:'#db277788',borderRadius:3}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:TICK,font:{size:11}}}},
      scales:{x:Object.assign({stacked:true},baseScale()),y:Object.assign({stacked:true},baseScale())}}
  });

  mkChart('ch-ga',{
    type:'bar',
    data:{labels:seasons,datasets:[
      {label:'ประตู',data:sd.map(function(d){return d.g;}),backgroundColor:'#059669cc',borderRadius:3},
      {label:'แอสซิสต์',data:sd.map(function(d){return d.a;}),backgroundColor:'#d9770688',borderRadius:3}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:TICK,font:{size:11}}}},
      scales:{x:Object.assign({stacked:true},baseScale()),y:Object.assign({stacked:true},baseScale())}}
  });

  var st=p.as_starter, su=p.as_sub;
  mkChart('ch-apptype',{
    type:'bar',
    data:{labels:['ตัวจริง','สำรอง'],datasets:[
      {label:'ชนะ',data:[st.W||0,su.W||0],backgroundColor:'#059669',borderRadius:3},
      {label:'เสมอ',data:[st.D||0,su.D||0],backgroundColor:'#d97706',borderRadius:3},
      {label:'แพ้',data:[st.L||0,su.L||0],backgroundColor:'#dc2626',borderRadius:3}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{x:Object.assign({stacked:true},baseScale()),y:Object.assign({stacked:true},baseScale())}}
  });
}

rebuildList();
</script>
</body>
