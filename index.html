<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chamchuri United — Player Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e1117;--surf:#161b27;--card:#1c2333;--bord:#ffffff14;
  --txt:#e8ecf4;--muted:#7b879e;--hint:#3a4560;
  --G:#34d399;--Y:#fbbf24;--R:#f87171;--B:#60a5fa;--P:#a78bfa;
  --gbg:#0d2e22;--ybg:#2d2200;--rbg:#2d1010;--bbg:#0f1f3d;
}
body{background:var(--bg);color:var(--txt);font-family:Sarabun,system-ui,sans-serif;font-size:14px;line-height:1.5}
a{color:var(--B)}
/* topbar */
.topbar{background:var(--surf);border-bottom:1px solid var(--bord);padding:0 20px;height:50px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.logo{font-size:16px;font-weight:600}.logo em{color:var(--B);font-style:normal}
.tag{font-size:11px;color:var(--muted);margin-left:auto}
/* filter bar */
.fbar{background:var(--surf);border-bottom:1px solid var(--bord);padding:10px 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;position:sticky;top:50px;z-index:90}
.fbar label{font-size:11px;color:var(--muted)}
select,input[type=text]{background:var(--card);border:1px solid var(--bord);color:var(--txt);padding:5px 10px;border-radius:6px;font-size:13px;font-family:inherit;cursor:pointer}
select:focus,input:focus{outline:none;border-color:var(--B)}
#inp-search{width:160px}
#inp-search::placeholder{color:var(--hint)}
.btn-clear{background:none;border:1px solid var(--bord);color:var(--muted);padding:4px 10px;border-radius:5px;cursor:pointer;font-size:12px;font-family:inherit}
.btn-clear:hover{color:var(--txt);border-color:var(--muted)}
.fcount{font-size:11px;color:var(--hint);margin-left:auto}
/* wrap */
.wrap{max-width:1260px;margin:0 auto;padding:20px}
/* empty */
.empty{text-align:center;padding:80px 0;color:var(--muted)}
.empty h2{font-size:20px;margin-bottom:8px}
/* player header */
.phead{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.avt{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px;flex-shrink:0}
.avt.GK{background:var(--bbg);color:var(--B)}
.avt.DF{background:var(--gbg);color:var(--G)}
.avt.MF{background:var(--ybg);color:var(--Y)}
.avt.FC{background:var(--rbg);color:var(--R)}
.phead-info h1{font-size:20px;font-weight:600;margin:0 0 2px}
.phead-info p{font-size:12px;color:var(--muted)}
.pbadge{display:inline-block;font-size:11px;font-weight:500;padding:2px 7px;border-radius:4px;margin-right:6px}
.pbadge.GK{background:var(--bbg);color:var(--B)}
.pbadge.DF{background:var(--gbg);color:var(--G)}
.pbadge.MF{background:var(--ybg);color:var(--Y)}
.pbadge.FC{background:var(--rbg);color:var(--R)}
/* season filter chips */
.season-strip{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.season-strip span{font-size:11px;color:var(--muted);margin-right:4px}
.chip{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--bord);cursor:pointer;background:none;color:var(--muted);font-family:inherit}
.chip:hover{border-color:var(--B);color:var(--B)}
.chip.active{background:var(--bbg);color:var(--B);border-color:var(--B)}
/* metrics */
.metrics{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px;margin-bottom:14px}
.met{background:var(--card);border:1px solid var(--bord);border-radius:10px;padding:12px 14px}
.met-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.met-val{font-size:22px;font-weight:600;line-height:1.1}
.met-sub{font-size:10px;color:var(--hint);margin-top:3px}
/* card */
.card{background:var(--card);border:1px solid var(--bord);border-radius:10px;padding:16px}
.ctitle{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
/* grids */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px;margin-bottom:12px}
/* stat rows */
.srow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bord)}
.srow:last-child{border-bottom:none}
.srow-name{font-size:12px;color:var(--muted)}
.srow-val{font-size:13px;font-weight:500}
/* wdl bars */
.wdl-r{display:flex;align-items:center;gap:8px;margin:6px 0}
.wdl-lbl{width:52px;font-size:12px;color:var(--muted)}
.wdl-track{flex:1;height:7px;background:var(--surf);border-radius:4px;overflow:hidden}
.wdl-fill{height:100%;border-radius:4px}
.wdl-n{width:28px;text-align:right;font-size:12px;font-weight:500}
/* compare */
.crow{display:flex;border-bottom:1px solid var(--bord);font-size:13px}
.crow:last-child{border:none}
.ccell{flex:1;padding:7px 8px}
.ccell.mid{width:90px;flex:none;background:var(--surf);text-align:center;font-size:10px;color:var(--hint)}
.ccell.win{color:var(--G);font-weight:500}
/* league/cup split */
.lcsplit{display:grid;gap:14px;margin-bottom:12px}
/* canvas */
canvas{display:block;width:100%!important}
@media(max-width:720px){
  .metrics{grid-template-columns:repeat(3,1fr)}
  .g2,.g3{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">⚽ <em>Chamchuri</em> United</div>
  <div class="tag">Player Dashboard · 2015–2025</div>
</div>

<div class="fbar">
  <label>ตำแหน่ง</label>
  <select id="sel-pos" onchange="rebuildPlayerList()">
    <option value="">ทั้งหมด</option>
    <option value="GK">GK</option>
    <option value="DF">DF</option>
    <option value="MF">MF</option>
    <option value="FC">FC</option>
  </select>
  <label>ค้นหา</label>
  <input type="text" id="inp-search" placeholder="ชื่อ / ชื่อเล่น..." oninput="rebuildPlayerList()">
  <label>เลือกนักเตะ</label>
  <select id="sel-player" onchange="onSelectPlayer()">
    <option value="">— เลือกนักเตะ —</option>
  </select>
  <label>เทียบกับ</label>
  <select id="sel-cmp" onchange="render()">
    <option value="">— เปรียบเทียบ —</option>
  </select>
  <button class="btn-clear" onclick="clearAll()">ล้างทั้งหมด</button>
  <span class="fcount" id="fcount"></span>
</div>

<div class="wrap" id="main"></div>

/* index for fast lookup */
const byPC = {};
DATA.forEach(p => byPC[p.pc] = p);

let activeSeasons = new Set(); /* empty = all */
let charts = {};

function mkChart(id, cfg) {
  if (charts[id]) charts[id].destroy();
  const el = document.getElementById(id);
  if (!el) return;
  charts[id] = new Chart(el, cfg);
}

const G='#34d399',Y='#fbbf24',R='#f87171',B='#60a5fa',P='#a78bfa';
const gridC='#ffffff08', tickC='#7b879e';
const baseScales = {
  x:{ticks:{color:tickC,font:{size:11}},grid:{color:gridC}},
  y:{ticks:{color:tickC,font:{size:11}},grid:{color:gridC}}
};

function pct(n, t) { return t > 0 ? Math.round(n / t * 100) : 0; }
function lbl(p) { return p.nick || (p.name.length > 10 ? p.name.slice(0,10)+'…' : p.name); }

/* ── BUILD PLAYER DROPDOWN ── */
function rebuildPlayerList() {
  const pos = document.getElementById('sel-pos').value;
  const q   = document.getElementById('inp-search').value.toLowerCase().trim();
  const s1  = document.getElementById('sel-player');
  const s2  = document.getElementById('sel-cmp');
  const prev1 = s1.value, prev2 = s2.value;

  while (s1.options.length > 1) s1.remove(1);
  while (s2.options.length > 1) s2.remove(1);

  let count = 0;
  DATA.forEach(p => {
    const matchPos  = !pos || p.pos === pos;
    const matchName = !q   || p.nick.toLowerCase().includes(q)
                            || p.name.toLowerCase().includes(q)
                            || p.pc.toLowerCase().includes(q);
    if (!matchPos || !matchName) return;
    count++;
    const txt = `${lbl(p)}  (${p.pos}) · ${p.total.apps} นัด`;
    s1.append(new Option(txt, p.pc));
    s2.append(new Option(txt, p.pc));
  });

  /* restore previous selection if still in list */
  if ([...s1.options].some(o => o.value === prev1)) s1.value = prev1;
  if ([...s2.options].some(o => o.value === prev2)) s2.value = prev2;

  document.getElementById('fcount').textContent = `${count} นักเตะ`;
  render();
}

function onSelectPlayer() {
  document.getElementById('sel-cmp').value = '';
  activeSeasons = new Set();
  render();
}

function clearAll() {
  document.getElementById('sel-pos').value   = '';
  document.getElementById('inp-search').value = '';
  document.getElementById('sel-player').value = '';
  document.getElementById('sel-cmp').value    = '';
  activeSeasons = new Set();
  rebuildPlayerList();
}

/* ── SEASON FILTER ── */
function toggleSeason(yr) {
  if (activeSeasons.has(yr)) activeSeasons.delete(yr);
  else activeSeasons.add(yr);
  render();
}

/* Filter player data to active seasons */
function filtered(p) {
  if (activeSeasons.size === 0) return p; /* no filter = all */
  const bs = {}, bc = {};
  for (const [k,v] of Object.entries(p.by_season)) {
    if (activeSeasons.has(Number(k))) bs[k] = v;
  }
  /* recompute totals from filtered seasons */
  let apps=0,starts=0,subs=0,g=0,a=0,W=0,D=0,L=0;
  for (const v of Object.values(bs)) {
    apps+=v.apps; starts+=v.starts; subs+=v.subs;
    g+=v.g; a+=v.a; W+=v.W||0; D+=v.D||0; L+=v.L||0;
  }
  /* by_comp from seasons that match */
  /* simplified: just show as single League entry */
  return {...p, total:{apps,starts,subs,g,a,W,D,L}, by_season:bs,
    by_comp: Object.fromEntries(
      Object.entries(p.by_comp).map(([k,v]) => [k, v]) /* keep original comp split */
    )
  };
}

/* ── RENDER ── */
function render() {
  const pc1 = document.getElementById('sel-player').value;
  const pc2 = document.getElementById('sel-cmp').value;
  const wrap = document.getElementById('main');
  if (!pc1) {
    wrap.innerHTML = '<div class="empty"><h2>เลือกนักเตะ</h2><p>ใช้ตัวกรองด้านบนเพื่อค้นหาและเลือกนักเตะ</p></div>';
    return;
  }
  const p  = filtered(byPC[pc1]);
  const p2 = pc2 ? byPC[pc2] : null;
  wrap.innerHTML = buildHTML(p, p2);
  requestAnimationFrame(() => drawAllCharts(p, p2));
}

  const allSeasons = Object.keys(orig.by_season).map(Number).sort();

    </div>
  </div>`;

  /* season selector chips */
  h += `<div class="season-strip">
    <span>filter season:</span>
    <button class="chip${activeSeasons.size===0?' active':''}" onclick="activeSeasons=new Set();render()">ทั้งหมด</button>
    ${chips}
  </div>`;

  /* metrics */
  h += `<div class="metrics">
    <div class="met"><div class="met-lbl">นัดทั้งหมด</div><div class="met-val" style="color:var(--B)">${t.apps}</div></div>
    <div class="met"><div class="met-lbl">ตัวจริง</div><div class="met-val" style="color:var(--G)">${t.starts}</div><div class="met-sub">${sr}%</div></div>
    <div class="met"><div class="met-lbl">ตัวสำรอง</div><div class="met-val" style="color:var(--P)">${t.subs}</div><div class="met-sub">${100-sr}%</div></div>
    <div class="met"><div class="met-lbl">ประตู</div><div class="met-val" style="color:var(--G)">${t.g}</div><div class="met-sub">${t.apps>0?(t.g/t.apps).toFixed(2):0}/นัด</div></div>
    <div class="met"><div class="met-lbl">แอสซิสต์</div><div class="met-val" style="color:var(--Y)">${t.a}</div><div class="met-sub">${t.apps>0?(t.a/t.apps).toFixed(2):0}/นัด</div></div>
    <div class="met"><div class="met-lbl">G+A</div><div class="met-val">${gc}</div><div class="met-sub">${t.apps>0?(gc/t.apps).toFixed(2):0}/นัด</div></div>
  </div>`;

  /* row 1: appearances chart + win ratio + stats */
  h += `<div class="g3">
    <div class="card">
      <div class="ctitle">appearances รายซีซัน (ตัวจริง + สำรอง)</div>
      <div style="position:relative;height:180px"><canvas id="ch-apps"></canvas></div>
    </div>
    <div class="card">
      <div class="ctitle">win ratio</div>
      <div style="text-align:center;padding:8px 0 12px">
        <div style="font-size:34px;font-weight:600;color:${wr>=50?'var(--G)':'var(--R)'}">${wr}%</div>
        <div style="font-size:11px;color:var(--muted)">win rate</div>
      </div>
      <div class="wdl-r"><span class="wdl-lbl">ชนะ</span><div class="wdl-track"><div class="wdl-fill" style="width:${pct(t.W,t.apps)}%;background:var(--G)"></div></div><span class="wdl-n" style="color:var(--G)">${t.W||0}</span></div>
      <div class="wdl-r"><span class="wdl-lbl">เสมอ</span><div class="wdl-track"><div class="wdl-fill" style="width:${pct(t.D,t.apps)}%;background:var(--Y)"></div></div><span class="wdl-n" style="color:var(--Y)">${t.D||0}</span></div>
      <div class="wdl-r"><span class="wdl-lbl">แพ้</span><div class="wdl-track"><div class="wdl-fill" style="width:${pct(t.L,t.apps)}%;background:var(--R)"></div></div><span class="wdl-n" style="color:var(--R)">${t.L||0}</span></div>
    </div>
    <div class="card">
      <div class="ctitle">สถิติรวม</div>
      ${sr2('ลงสนาม', t.apps, ' นัด')}
      ${sr2('ตัวจริง', t.starts, ` (${sr}%)`)}
      ${sr2('ตัวสำรอง', t.subs, '')}
      ${sr2('ประตู', t.g, '', 'var(--G)')}
      ${sr2('แอสซิสต์', t.a, '', 'var(--Y)')}
      ${sr2('G+A', gc, '')}
    </div>
  </div>`;

  /* row 2: goals+assists per season + starter/sub win */
  const stW=p.as_starter.W||0, stD=p.as_starter.D||0, stL=p.as_starter.L||0, stT=stW+stD+stL;
  const suW=p.as_sub.W||0,    suD=p.as_sub.D||0,    suL=p.as_sub.L||0,    suT=suW+suD+suL;
  h += `<div class="g2">
    <div class="card">
      <div class="ctitle">ประตู + แอสซิสต์ รายซีซัน</div>
      <div style="position:relative;height:180px"><canvas id="ch-ga"></canvas></div>
    </div>
    <div class="card">
      <div class="ctitle">win rate — ตัวจริง vs สำรอง</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
        <div style="text-align:center">
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px">ตัวจริง</div>
          <div style="font-size:28px;font-weight:600;color:${pct(stW,stT)>=50?'var(--G)':'var(--R)'}">${pct(stW,stT)}%</div>
          <div style="font-size:10px;color:var(--hint)">${stW}W ${stD}D ${stL}L</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px">ตัวสำรอง</div>
          <div style="font-size:28px;font-weight:600;color:${pct(suW,suT)>=50?'var(--G)':'var(--R)'}">${pct(suW,suT)}%</div>
          <div style="font-size:10px;color:var(--hint)">${suW}W ${suD}D ${suL}L</div>
        </div>
      </div>
      <div style="position:relative;height:90px"><canvas id="ch-apptype"></canvas></div>
    </div>
  </div>`;

  /* League vs Cup */
  const comps = Object.keys(p.by_comp);
  if (comps.length) {
    const cols = comps.length > 1 ? '1fr 1fr' : '1fr';
    h += `<div class="card" style="margin-bottom:12px">
      <div class="ctitle">League vs Cup</div>
      <div style="display:grid;grid-template-columns:${cols};gap:20px">
        ${comps.map(c => {
          const d = p.by_comp[c];
          return `<div>
            <div style="font-size:13px;font-weight:500;color:${c==='League'?'var(--B)':'var(--P)'};margin-bottom:8px">${c}</div>
            ${sr2('นัด', d.apps, '')}
            ${sr2('ตัวจริง', d.starts, '')}
            ${sr2('สำรอง', d.subs, '')}
            ${sr2('ประตู', d.g, '', 'var(--G)')}
            ${sr2('แอสซิสต์', d.a, '', 'var(--Y)')}
            ${sr2('G+A', d.g+d.a, '')}
            <div style="margin-top:8px;display:flex;gap:10px;font-size:12px">
              <span style="color:var(--G)">W ${d.W||0}</span>
              <span style="color:var(--Y)">D ${d.D||0}</span>
              <span style="color:var(--R)">L ${d.L||0}</span>
            </div>
          </div>`;
        }).join('<div style="border-left:1px solid var(--bord)"></div>')}
      </div>
    </div>`;
  }

  /* compare */
  if (p2) {
    const pr2 = byPC[p2.pc]; /* always use raw (unfiltered) data for p2 */
    const pr1 = byPC[p.pc];  /* raw data for p1 too so comparison is fair */
    h += `<div class="card" style="margin-bottom:12px">
      <div class="ctitle">เปรียบเทียบ ${lbl(pr1)} vs ${lbl(pr2)}</div>
      <div style="position:relative;height:200px;margin-bottom:14px"><canvas id="ch-cmp"></canvas></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        ${cmpRow(pr1,pr2,'นัดทั้งหมด','apps')}
        ${cmpRow(pr1,pr2,'ตัวจริง','starts')}
        ${cmpRow(pr1,pr2,'สำรอง','subs')}
        ${cmpRow(pr1,pr2,'ประตู','g')}
        ${cmpRow(pr1,pr2,'แอสซิสต์','a')}
        ${cmpRow(pr1,pr2,'G+A',null,'gc')}
        ${cmpRow(pr1,pr2,'Win %',null,'wr')}
      </div>
    </div>`;
  }

  return h;
}

function sr2(name, val, sub, color) {
  return `<div class="srow"><span class="srow-name">${name}</span><span class="srow-val"${color?` style="color:${color}"`:''}>${val}${sub||''}</span></div>`;
}

function cmpRow(p1, p2, rowLabel, key, special) {
  let v1, v2;
  if (special === 'gc') { v1 = p1.total.g + p1.total.a; v2 = p2.total.g + p2.total.a; }
  else if (special === 'wr') { v1 = pct(p1.total.W||0, p1.total.apps); v2 = pct(p2.total.W||0, p2.total.apps); }
  else { v1 = p1.total[key]||0; v2 = p2.total[key]||0; }
  const suf = special==='wr' ? '%' : '';
  return `<div class="crow">
    <div class="ccell${v1>v2?' win':''}">${lbl(p1)}: <b>${v1}${suf}</b></div>
    <div class="ccell mid">${rowLabel}</div>
    <div class="ccell${v2>v1?' win':''}" style="text-align:right"><b>${v2}${suf}</b> :${lbl(p2)}</div>
  </div>`;
}

/* ── CHARTS ── */
function drawAllCharts(p, p2) {
  const seasons = Object.keys(p.by_season).sort();
  const sd = seasons.map(s => p.by_season[s]);

  /* Appearances stacked */
  mkChart('ch-apps', {
    type: 'bar',
    data: {
      labels: seasons,
      datasets: [
        {label:'ตัวจริง', data:sd.map(d=>d.starts), backgroundColor:G+'cc', borderRadius:3},
        {label:'สำรอง',  data:sd.map(d=>d.subs),   backgroundColor:B+'88', borderRadius:3}
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{labels:{color:tickC,font:{size:11}}}},
      scales:{x:{...baseScales.x,stacked:true},y:{...baseScales.y,stacked:true}}
    }
  });

  /* Goals + Assists stacked */
  mkChart('ch-ga', {
    type: 'bar',
    data: {
      labels: seasons,
      datasets: [
        {label:'ประตู',     data:sd.map(d=>d.g), backgroundColor:G+'cc', borderRadius:3},
        {label:'แอสซิสต์', data:sd.map(d=>d.a), backgroundColor:Y+'88', borderRadius:3}
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{labels:{color:tickC,font:{size:11}}}},
      scales:{x:{...baseScales.x,stacked:true},y:{...baseScales.y,stacked:true}}
    }
  });

  /* Starter vs Sub WDL */
  const st=p.as_starter, su=p.as_sub;
  mkChart('ch-apptype', {
    type:'bar',
    data:{
      labels:['ตัวจริง','สำรอง'],
      datasets:[
        {label:'ชนะ',data:[st.W||0,su.W||0],backgroundColor:G,borderRadius:3},
        {label:'เสมอ',data:[st.D||0,su.D||0],backgroundColor:Y,borderRadius:3},
        {label:'แพ้', data:[st.L||0,su.L||0],backgroundColor:R,borderRadius:3}
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{x:{...baseScales.x,stacked:true},y:{...baseScales.y,stacked:true}}
    }
  });

  /* Comparison radar - always use raw totals for fair comparison */
  if (p2 && document.getElementById('ch-cmp')) {
    const r1 = byPC[p.pc];
    const r2 = byPC[p2.pc];
    const maxA  = Math.max(r1.total.apps,           r2.total.apps)           || 1;
    const maxG  = Math.max(r1.total.g,               r2.total.g)               || 1;
    const maxAs = Math.max(r1.total.a,               r2.total.a)               || 1;
    const maxGC = Math.max(r1.total.g+r1.total.a,   r2.total.g+r2.total.a)   || 1;
    const norm = q => [
      Math.round(q.total.apps / maxA * 100),
      Math.round(q.total.g    / maxG * 100),
      Math.round(q.total.a    / maxAs * 100),
      Math.round((q.total.g + q.total.a) / maxGC * 100),
      pct(q.total.W || 0, q.total.apps)
    ];
    mkChart('ch-cmp', {
      type: 'radar',
      data: {
        labels: ['นัดที่ลง','ประตู','แอสซิสต์','G+A','Win%'],
        datasets: [
          {label:lbl(r1), data:norm(r1), borderColor:B, backgroundColor:B+'22', pointBackgroundColor:B},
          {label:lbl(r2), data:norm(r2), borderColor:P, backgroundColor:P+'22', pointBackgroundColor:P}
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        scales:{r:{ticks:{color:tickC,font:{size:10},backdropColor:'transparent'},grid:{color:'#ffffff12'},pointLabels:{color:tickC,font:{size:11}}}},
        plugins:{legend:{labels:{color:tickC,font:{size:11}}}}
      }
    });
  }
}

/* ── INIT ── */
rebuildPlayerList();
</script>
</body>
</html>
